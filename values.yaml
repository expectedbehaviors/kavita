# Baseline Kavita values. Override ingress, library PVCs, and resource limits in your deployment values.
kavita:
  global:
    fullnameOverride: kavita
  defaultPodOptions:
    securityContext:
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
  controllers:
    main:
      enabled: true
      type: deployment
      replicas: 1
      containers:
        main:
          env:
            PGID: "1000"
            PUID: "1000"
            TZ: UTC
            UMASK: "002"
          image:
            repository: ghcr.io/kareadita/kavita
            tag: latest
            pullPolicy: IfNotPresent
          probes:
            startup:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/health
                  port: 5000
                initialDelaySeconds: 0
                periodSeconds: 5
                timeoutSeconds: 3
                failureThreshold: 60
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/health
                  port: 5000
                initialDelaySeconds: 0
                periodSeconds: 10
                timeoutSeconds: 1
                failureThreshold: 10
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /api/health
                  port: 5000
                initialDelaySeconds: 0
                periodSeconds: 10
                timeoutSeconds: 1
                failureThreshold: 10
          resources:
            limits:
              cpu: 2
              memory: 4Gi
            requests:
              cpu: 10m
              memory: 512Mi
  service:
    main:
      enabled: true
      controller: main
      primary: true
      ports:
        http:
          enabled: true
          primary: true
          port: 5000
  ingress:
    main:
      enabled: true
      className: nginx
      annotations: {}
      hosts:
        - host: kavita.example.com
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - hosts:
            - kavita.example.com
          secretName: kavita-tls
  persistence:
    config:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 2Gi
      storageClass: ""
      globalMounts:
        - path: /kavita/config
          readOnly: false
    books:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteMany
      size: 50Gi
      storageClass: ""
      globalMounts:
        - path: /books
          readOnly: false
    comics:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteMany
      size: 50Gi
      storageClass: ""
      globalMounts:
        - path: /comics
          readOnly: false
